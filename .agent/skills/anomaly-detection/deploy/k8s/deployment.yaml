apiVersion: apps/v1
kind: Deployment
metadata:
  name: edc-rwd-anomaly-detection
spec:
  replicas: 2
  selector:
    matchLabels:
      app: edc-rwd-anomaly-detection
  template:
    metadata:
      labels:
        app: edc-rwd-anomaly-detection
    spec:
      containers:
        - name: api
          image: edc-rwd-anomaly-detection:0.1.0
          ports:
            - containerPort: 8000
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
